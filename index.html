<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CosmosAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #050506;
    --surface: rgba(255,255,255,0.045);
    --surface-2: rgba(255,255,255,0.08);
    --surface-3: rgba(255,255,255,0.13);
    --border: rgba(255,255,255,0.10);
    --border-strong: rgba(255,255,255,0.22);
    --text: #F3F4F6;
    --text-muted: #9AA0AC;
    --text-faint: #5D626B;
    --white: #FFFFFF;
    --ease: cubic-bezier(.16,.84,.44,1);
  }
  html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
  h1, h2, .display { font-family: 'Space Grotesk', sans-serif; }
  code, .mono { font-family: 'JetBrains Mono', monospace; }
  #app { position: relative; width: 100%; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  ::selection { background: rgba(255,255,255,0.85); color:#000; }

  .cosmos-canvas { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  .nebula { position: fixed; border-radius: 50%; filter: blur(95px); pointer-events: none; z-index: 0; }
  .nebula-a { width: 560px; height: 560px; top: -200px; left: -160px; background: radial-gradient(circle, rgba(255,255,255,0.06), transparent 70%); }
  .nebula-b { width: 620px; height: 620px; bottom: -220px; right: -190px; background: radial-gradient(circle, rgba(255,255,255,0.045), transparent 70%); }

  .header-container {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 40;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(5,5,6,0.90);
    backdrop-filter: blur(14px);
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-strong);
  }

  .header-left, .header-right { display: flex; align-items: center; gap: 13px; }

  .glass { background: rgba(16,16,19,0.5); backdrop-filter: blur(16px) saturate(140%); border: 1px solid var(--border-strong); box-shadow: 0 8px 30px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.05); }

  .history-btn { width: 46px; height: 46px; border-radius: 13px; flex-shrink:0; cursor:pointer; display:flex; align-items:center; justify-content:center; transition: border-color .25s var(--ease), background .25s var(--ease), transform .15s var(--ease); }
  .history-btn:hover { border-color: rgba(255,255,255,0.4); background: rgba(24,24,28,0.65); }
  .history-btn:active { transform: scale(0.93); }
  .history-icon { width: 19px; height: 15px; display:flex; flex-direction:column; justify-content:space-between; }
  .history-icon span { display:block; height: 2px; border-radius: 2px; background: var(--text); transition: transform .25s var(--ease); }
  .history-icon span:first-child { width: 100%; }
  .history-icon span:last-child { width: 62%; }

  .brand-gradient { font-family: 'Space Grotesk'; font-weight: 700; font-size: 24px; letter-spacing: 0.01em; background: linear-gradient(90deg, #6b6d72, #ffffff); -webkit-background-clip: text; background-clip: text; color: transparent; user-select: none; }

  .fab-new { width: 46px; height: 46px; border-radius: 50%; color: var(--white); cursor:pointer; display:flex; align-items:center; justify-content:center; transition: background .25s var(--ease), transform .2s var(--ease), border-color .25s var(--ease); }
  .fab-new:hover { background: rgba(255,255,255,0.14); transform: scale(1.08) rotate(90deg); border-color: rgba(255,255,255,0.4); }
  .fab-new:active { transform: scale(0.92) rotate(90deg); }
  .fab-new svg { width: 19px; height: 19px; }

  .drawer-backdrop { position: fixed; inset:0; background: rgba(0,0,0,0.55); backdrop-filter: blur(3px); z-index: 45; opacity:0; pointer-events:none; transition: opacity .3s var(--ease); }
  .drawer-backdrop.open { opacity:1; pointer-events:auto; }
  .drawer { position: fixed; top:0; left:0; bottom:0; width: 300px; max-width: 86vw; background: rgba(8,8,10,0.85); backdrop-filter: blur(22px) saturate(150%); border-right: 1px solid var(--border-strong); z-index: 46; transform: translateX(-100%); transition: transform .38s var(--ease); display:flex; flex-direction:column; padding: 18px 14px; }
  .drawer.open { transform: translateX(0); }
  .drawer-head { display:flex; align-items:center; justify-content:space-between; padding: 4px 6px 14px; }
  .drawer-title { font-family:'Space Grotesk'; font-weight:700; font-size:12.5px; letter-spacing:0.14em; color: var(--text-muted); text-transform:uppercase; }
  .drawer-actions { display:flex; align-items:center; gap:10px; }
  .clear-all-btn { background:none; border:none; color: var(--text-faint); font-size:12px; font-family:'Inter'; font-weight:500; cursor:pointer; padding:6px 10px; border-radius:7px; transition: color .2s, background .2s; }
  .clear-all-btn:hover { color: var(--text); background: var(--surface); }
  .drawer-close { width:28px; height:28px; border-radius:8px; background:none; border:1px solid transparent; color: var(--text-muted); display:flex; align-items:center; justify-content:center; cursor:pointer; transition: background .15s, color .15s; }
  .drawer-close:hover { background: var(--surface); color: var(--white); }
  .drawer-close svg { width:14px; height:14px; }
  .search-row { display:flex; align-items:center; gap:9px; background: rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:11px; padding:10px 13px; margin-bottom:14px; transition: border-color .2s; }
  .search-row:focus-within { border-color: rgba(255,255,255,0.35); }
  .search-row svg { width:14px; height:14px; color: var(--text-faint); flex-shrink:0; }
  .search-row input { flex:1; background:none; border:none; outline:none; color: var(--text); font-size:13px; font-family:'Inter'; }
  .search-row input::placeholder { color: var(--text-faint); }
  .new-chat-btn { display:flex; align-items:center; justify-content:center; gap:8px; padding: 11px 14px; border-radius: 12px; background: var(--surface-2); border:1px solid var(--border-strong); color: var(--text); font-size: 13px; font-weight: 600; cursor:pointer; transition: background .2s var(--ease), transform .15s var(--ease); margin-bottom: 14px; width:100%; }
  .new-chat-btn:hover { background: var(--surface-3); }
  .new-chat-btn:active { transform: scale(0.98); }
  .new-chat-btn svg { width:15px; height:15px; }
  .conv-list { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:6px; }
  .conv-list::-webkit-scrollbar { width:5px; }
  .conv-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius:10px; }
  .conv-empty { color: var(--text-faint); font-size:12.5px; padding: 20px 10px; line-height:1.6; text-align:center; }
  .conv-item { display:flex; align-items:center; gap:10px; padding: 12px 14px; border-radius:14px; cursor:pointer; color: var(--text-muted); font-size: 13px; position:relative; background: transparent; border: 1px solid transparent; transition: background .2s var(--ease), color .2s var(--ease), border-color .2s var(--ease); }
  .conv-item:hover { background: var(--surface); color: var(--text); }
  .conv-item.active { background: rgba(255,255,255,0.92); color: #0a0a0c; border-color: rgba(255,255,255,0.92); font-weight: 600; }
  .conv-item.active .conv-icon, .conv-item.active .conv-del { color: #0a0a0c; }
  .conv-icon { flex-shrink:0; width:16px; height:16px; opacity:0.7; }
  .conv-title { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .conv-del { opacity:0; background:none; border:none; color: var(--text-faint); cursor:pointer; padding:4px; display:flex; border-radius:6px; }
  .conv-del svg { width:14px; height:14px; }
  .conv-item:hover .conv-del { opacity:1; }
  .conv-del:hover { background: rgba(0,0,0,0.12); }

  .about-btn {
    display:flex; align-items:center; gap:10px;
    background: rgba(220,220,230,0.15);
    border:1px solid rgba(200,200,210,0.30);
    color: #d8d8e0;
    font-size:12.5px;
    padding: 11px 14px;
    border-radius: 12px;
    cursor:pointer;
    transition: color .2s, border-color .2s, background .2s;
    width:100%;
    text-decoration:none;
    margin-top: 6px;
    font-family:'Inter';
  }
  .about-btn:hover { color: #ffffff; border-color: rgba(255,255,255,0.4); background: rgba(220,220,230,0.25); }
  .about-btn svg { width:16px; height:16px; flex-shrink:0; }

  .settings-btn { margin-top: 6px; display:flex; align-items:center; gap:8px; background:none; border:1px solid var(--border); color: var(--text-muted); font-size:12.5px; padding: 11px 12px; border-radius: 12px; cursor:pointer; transition: color .2s, border-color .2s; width:100%; }
  .settings-btn:hover { color: var(--white); border-color: var(--border-strong); }
  .settings-btn svg { width:14px; height:14px; }

  .main { position:relative; z-index:2; width:100%; flex:1; display:flex; flex-direction:column; min-height:0; }

  .welcome-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap: 18px; padding: 0 24px; text-align:center; z-index:1; transition: opacity .3s ease; }
  .welcome-center.hidden { display:none; }
  .orbit-emblem { position:relative; width: 260px; height: 260px; }
  .orbit-emblem::before { content:""; position:absolute; inset:-40px; border-radius:50%; background: radial-gradient(circle, rgba(255,255,255,0.05), transparent 70%); filter: blur(10px); }
  .orbit-ring-el { position:absolute; border: 1px solid rgba(255,255,255,0.14); border-radius:50%; border-top-color: rgba(255,255,255,0.35); border-right-color: rgba(255,255,255,0.05); }
  .orbit-ring-el.r1 { inset: 10%; animation: spin-cw 40s linear infinite; }
  .orbit-ring-el.r2 { inset: 22%; animation: spin-ccw 55s linear infinite; border-top-color: rgba(255,255,255,0.06); border-left-color: rgba(255,255,255,0.28); }
  .orbit-ring-el.r3 { inset: 34%; animation: spin-cw 32s linear infinite; }
  @keyframes spin-cw { to { transform: rotate(360deg); } }
  @keyframes spin-ccw { to { transform: rotate(-360deg); } }
  .orbit-core { position:absolute; top:50%; left:50%; width:34px; height:34px; margin:-17px 0 0 -17px; border-radius:50%; background: radial-gradient(circle at 35% 30%, #ffffff, #b7bac0 55%, #4d4f54 100%); box-shadow: 0 0 30px 6px rgba(255,255,255,0.35), 0 0 70px 18px rgba(255,255,255,0.1); animation: pulse-core 4.5s ease-in-out infinite; }
  @keyframes pulse-core { 0%,100% { box-shadow: 0 0 30px 6px rgba(255,255,255,0.32), 0 0 70px 18px rgba(255,255,255,0.09); } 50% { box-shadow: 0 0 40px 10px rgba(255,255,255,0.45), 0 0 90px 24px rgba(255,255,255,0.14); } }
  .orbit-satellite { position:absolute; border-radius:50%; background:#fff; }
  .welcome-title { font-size: clamp(20px, 4.4vw, 26px); font-weight: 700; color: var(--white); margin:4px 0 0; letter-spacing: 0.05em; }
  .welcome-year { font-family:'JetBrains Mono'; font-size:11px; color: var(--text-faint); letter-spacing:0.2em; margin-top: 4px; }

  .messages { flex:1; overflow-y:auto; padding: 140px 20px 16px; display:flex; flex-direction:column; gap:20px; scroll-behavior: smooth; min-height:0; }
  .messages::-webkit-scrollbar { width:6px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius:10px; }
  .messages.hidden { display:none; }

  .msg-row:first-child { margin-top: 20px; }

  .msg-row { display:flex; max-width:740px; width:100%; margin:0 auto; gap:10px; align-items:flex-end; animation: msgIn .35s var(--ease); }
  @keyframes msgIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }
  .msg-row.user { justify-content:flex-end; }
  .msg-row.assistant { justify-content:flex-start; }
  .msg-avatar { width:29px; height:29px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; font-family:'Space Grotesk'; }
  .assistant-avatar { background: radial-gradient(circle at 35% 30%, #fff, #9aa0ac 60%, #3a3d42 100%); color:#0a0a0c; box-shadow: 0 0 10px rgba(255,255,255,0.25); }
  .user-avatar { background: var(--surface-2); border:1px solid var(--border-strong); color: var(--text-muted); font-size:10px; }

  .msg-bubble { max-width:76%; padding:16px 22px; border-radius:18px; font-size:14.5px; line-height:1.8; transition: all 0.2s ease; position: relative; overflow: hidden; }
  .msg-row.user .msg-bubble { background: rgba(255,255,255,0.06); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: #f0f0f5; border: 1px solid rgba(255,255,255,0.08); border-bottom-right-radius: 4px; box-shadow: 0 4px 24px rgba(0,0,0,0.2); }
  .msg-row.user .msg-bubble::before { content: ''; position: absolute; inset: -1px; border-radius: 18px; padding: 1px; background: linear-gradient(135deg, rgba(255,255,255,0.02), rgba(255,255,255,0.12), rgba(255,255,255,0.02)); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; z-index: 0; }
  .msg-row.user .msg-bubble .msg-text, .msg-row.user .msg-bubble .msg-image, .msg-row.user .msg-bubble .msg-doc-chip { position: relative; z-index: 1; }
  .msg-row.assistant .msg-bubble { background: rgba(255,255,255,0.03); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); color: var(--text); border: 1px solid rgba(255,255,255,0.04); border-bottom-left-radius: 4px; box-shadow: 0 4px 24px rgba(0,0,0,0.12); }
  .msg-row.assistant .msg-bubble::before { content: ''; position: absolute; inset: -1px; border-radius: 18px; padding: 1px; background: linear-gradient(135deg, rgba(255,255,255,0.01), rgba(255,255,255,0.08), rgba(255,255,255,0.01)); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; z-index: 0; }
  .msg-row.assistant .msg-bubble .msg-text, .msg-row.assistant .msg-bubble .code-block, .msg-row.assistant .msg-bubble .msg-doc-chip { position: relative; z-index: 1; }
  .msg-row.user .msg-bubble::after { content: '✦'; position: absolute; bottom: 4px; right: 8px; font-size: 7px; color: rgba(255,255,255,0.06); pointer-events: none; font-family: 'Arial', sans-serif; }
  .msg-row.assistant .msg-bubble::after { content: '✦'; position: absolute; bottom: 4px; right: 8px; font-size: 7px; color: rgba(255,255,255,0.04); pointer-events: none; font-family: 'Arial', sans-serif; }

  .msg-text { white-space: pre-wrap; word-break: break-word; }
  .msg-image { max-width:260px; border-radius:12px; display:block; margin-bottom:8px; border:1px solid var(--border-strong); }
  .msg-doc-chip { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:10px; background: rgba(0,0,0,0.15); border:1px solid rgba(0,0,0,0.15); font-size:12px; margin-bottom:8px; }
  .msg-row.assistant .msg-doc-chip { background: rgba(255,255,255,0.06); border-color: var(--border-strong); }
  .msg-doc-chip svg { width:14px; height:14px; flex-shrink:0; opacity:0.8; }

  .type-cursor { display:inline-block; width:2px; height:1em; background: var(--text); vertical-align: text-bottom; margin-left:1px; animation: blink 0.9s step-end infinite; }
  @keyframes blink { 50% { opacity:0; } }

  .code-block { margin: 10px 0; border-radius:12px; overflow:hidden; border:1px solid var(--border-strong); background: #08080a; animation: msgIn .3s var(--ease); }
  .code-head { display:flex; align-items:center; justify-content:space-between; padding: 8px 12px; background: rgba(255,255,255,0.04); border-bottom:1px solid var(--border); }
  .code-lang { font-family:'JetBrains Mono'; font-size:11px; color: var(--text-faint); text-transform:uppercase; letter-spacing:0.06em; }
  .code-actions { display:flex; gap:5px; }
  .code-btn { display:flex; align-items:center; gap:5px; padding:5px 9px; border-radius:7px; background:none; border:1px solid var(--border); color: var(--text-muted); font-size:10.5px; font-family:'Inter'; font-weight:500; cursor:pointer; transition: background .15s, color .15s; }
  .code-btn:hover { background: var(--surface-2); color: var(--white); }
  .code-btn svg { width:11px; height:11px; }
  .code-body { margin:0; padding: 14px; font-family:'JetBrains Mono'; font-size:12px; line-height:1.65; color: #d7dbe0; white-space:pre; overflow-x:auto; }
  .code-body::-webkit-scrollbar { height:6px; }
  .code-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); border-radius:10px; }
  .code-run-out { padding: 10px 14px; border-top:1px solid var(--border); background: rgba(255,255,255,0.02); font-family:'JetBrains Mono'; font-size:11.5px; color: var(--text-muted); white-space:pre-wrap; display:none; }
  .code-run-out.show { display:block; }

  .loading-bubble { display:flex; align-items:center; padding:14px 20px; }
  .orbit-loader { position:relative; width:24px; height:24px; }
  .orbit-loader-core { position:absolute; top:50%; left:50%; width:5px; height:5px; margin:-2.5px 0 0 -2.5px; border-radius:50%; background:#fff; box-shadow:0 0 8px rgba(255,255,255,0.8); }
  .orbit-loader-ring { position:absolute; inset:0; border:1px solid var(--border-strong); border-radius:50%; animation: spin-cw 1.3s linear infinite; }
  .orbit-loader-dot { position:absolute; top:-2px; left:50%; width:4px; height:4px; margin-left:-2px; border-radius:50%; background:#fff; }

  .toast-banner { margin: 0 20px 8px; padding: 11px 15px; border-radius:12px; background: rgba(255,255,255,0.06); border:1px solid var(--border-strong); color: var(--text); font-size:12.5px; display:flex; align-items:center; gap:9px; max-width:740px; margin-left:auto; margin-right:auto; position:relative; z-index:2; animation: msgIn .25s var(--ease); }
  .toast-banner svg { width:15px; height:15px; flex-shrink:0; }
  .toast-banner.hidden { display:none; }

  .composer { 
    position: sticky; 
    bottom: 0; 
    z-index: 20; 
    padding: 10px 18px 14px; 
    background: rgba(5,5,6,0.95); 
    backdrop-filter: blur(16px); 
    border-top: 1px solid var(--border-strong);
    flex-shrink: 0;
    margin-top: auto;
  }
  .attach-preview { max-width:740px; margin:0 auto 10px; display:flex; align-items:center; gap:10px; width:fit-content; border-radius:14px; padding:8px 12px; }
  .attach-preview img { height:46px; width:46px; object-fit:cover; border-radius:9px; }
  .attach-preview .doc-icon { width:46px; height:46px; border-radius:9px; background: var(--surface-3); display:flex; align-items:center; justify-content:center; }
  .attach-preview .doc-icon svg { width:20px; height:20px; opacity:0.8; }
  .attach-preview .attach-name { font-size:12px; color: var(--text-muted); max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .attach-preview button { width:22px; height:22px; border-radius:50%; background: var(--surface-3); color: var(--text); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .attach-preview button svg { width:11px; height:11px; }

  .composer-row { max-width:740px; margin:0 auto; display:flex; align-items:flex-end; gap:6px; border-radius:24px; padding: 8px 8px 8px 10px; position:relative; transition: box-shadow .25s var(--ease), border-color .25s var(--ease); }
  .composer-row:focus-within { border-color: rgba(255,255,255,0.4); box-shadow: 0 0 0 4px rgba(255,255,255,0.05), 0 10px 34px rgba(0,0,0,0.4); }
  .composer-row textarea { flex:1; background:none; border:none; outline:none; resize:none; color: var(--text); font-family:'Inter'; font-size:14.5px; line-height:1.5; max-height:150px; padding:11px 4px; }
  .composer-row textarea::placeholder { color: var(--text-faint); }

  .round-btn { width:42px; height:42px; border-radius:50%; background:none; border:1px solid transparent; color: var(--text-muted); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition: background .2s var(--ease), color .2s var(--ease), transform .15s var(--ease); position:relative; }
  .round-btn:hover { background: var(--surface-2); color: var(--white); }
  .round-btn:active { transform: scale(0.9); }
  .round-btn.active { background: var(--surface-3); color: var(--white); }
  .round-btn svg { width:19px; height:19px; }
  .round-btn.recording { color:#fff; }
  .round-btn.recording::after { content:""; position:absolute; width:42px; height:42px; border-radius:50%; border: 1.5px solid rgba(255,255,255,0.5); animation: pulse-rec 1.4s ease-out infinite; }
  @keyframes pulse-rec { 0% { transform: scale(1); opacity:0.8; } 100% { transform: scale(1.7); opacity:0; } }

  .send-btn { width:42px; height:42px; border-radius:50%; background:#fff; border:none; color:#000; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition: transform .18s var(--ease), opacity .18s ease; }
  .send-btn:hover:not(:disabled) { transform: scale(1.08); }
  .send-btn:active:not(:disabled) { transform: scale(0.92); }
  .send-btn:disabled { opacity:0.35; cursor:default; }
  .send-btn svg { width:18px; height:18px; }

  .modal input:focus { border-color: rgba(255,255,255,0.45); }
  .modal-label { display:block; font-size:11.5px; font-weight:600; color: var(--text-muted); margin-bottom:7px; letter-spacing:0.02em; }

  .personality-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:8px; margin-bottom:16px; }
  .personality-btn { padding: 12px 14px; border-radius:10px; background: var(--surface); border:1px solid var(--border-strong); color: var(--text); font-size:13px; font-weight:500; cursor:pointer; transition: background .2s, border-color .2s, transform .15s; font-family:'Inter'; text-align:center; }
  .personality-btn:hover { background: var(--surface-2); transform: scale(1.02); }
  .personality-btn.selected { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.45); color: #fff; }

  .modal-actions { display:flex; justify-content:flex-end; gap:10px; }
  .btn-primary, .btn-ghost { padding:10px 20px; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; transition: transform .15s var(--ease), opacity .15s; }
  .btn-primary { background:#fff; color:#000; border:none; }
  .btn-primary:hover:not(:disabled) { transform: translateY(-1px); }
  .btn-primary:disabled { opacity:0.4; cursor:default; }
  .btn-ghost { background:none; border:1px solid var(--border-strong); color: var(--text-muted); }
  .btn-ghost:hover { color: var(--white); }

  .hidden { display:none; }

  .preview-overlay { position:fixed; inset:0; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); z-index:60; display:flex; align-items:center; justify-content:center; padding: 30px; }

<script>
(function () {
  const GROQ_MODEL = "meta-llama/llama-4-scout-17b-16e-instruct";
  const GROQ_ENDPOINT = "https://api.groq.com/openai/v1/chat/completions";
const API_KEY = "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";
  const MAX_IMAGE_DIM = 1024;
  const TEXT_EXTENSIONS = ["txt", "md", "csv", "json", "log"];
  const LS = { conv: "cosmos:conversations", profile: "cosmos:profile" };

  let conversations = [];
  let activeId = null;
  let userName = "";
  let aiPersonality = "normal";
  let attachment = null;
  let loading = false;
  let searchQuery = "";
  let recognizing = false;
  let scrollInterval = null;

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
  function escapeHtml(str) { const d = document.createElement("div"); d.textContent = str; return d.innerHTML; }

  const drawer = document.getElementById("drawer");
  const drawerBackdrop = document.getElementById("drawerBackdrop");
  const convListEl = document.getElementById("convList");
  const searchInput = document.getElementById("searchInput");
  const welcomeCenter = document.getElementById("welcomeCenter");
  const messagesEl = document.getElementById("messages");
  const toastBanner = document.getElementById("toastBanner");
  const attachPreviewEl = document.getElementById("attachPreview");
  const messageInputEl = document.getElementById("messageInput");
  const sendBtn = document.getElementById("sendBtn");
  const micBtn = document.getElementById("micBtn");
  const attachBtn = document.getElementById("attachBtn");
  const attachMenu = document.getElementById("attachMenu");
  const imageInputEl = document.getElementById("imageInput");
  const docInputEl = document.getElementById("docInput");
  const setupOverlay = document.getElementById("setupOverlay");
  const userNameInput = document.getElementById("userNameInput");
  const saveSetupBtn = document.getElementById("saveSetupBtn");
  const previewOverlay = document.getElementById("previewOverlay");
  const previewFrame = document.getElementById("previewFrame");
  const personalityGrid = document.getElementById("personalityGrid");

  // ===== SCROLL NATURAL (TANPA DIPAKSA) =====
  function smoothScrollToBottom() {
    if (!messagesEl) return;
    if (scrollInterval) clearInterval(scrollInterval);
    const lastMsg = messagesEl.lastElementChild;
    if (lastMsg) {
      lastMsg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }

  function safeGet(key) { try { return localStorage.getItem(key); } catch (e) { return null; } }
  function safeSet(key, val) { try { localStorage.setItem(key, val); return true; } catch (e) { return false; } }

  function loadState() {
    try {
      const convRaw = safeGet(LS.conv);
      conversations = convRaw ? JSON.parse(convRaw) : [];
      if (conversations.length) activeId = conversations[0].id;
      const profileRaw = safeGet(LS.profile);
      if (profileRaw) {
        const profile = JSON.parse(profileRaw);
        userName = profile.name || "";
        aiPersonality = profile.personality || "normal";
      }
      document.querySelectorAll('.personality-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.value === aiPersonality);
      });
      if (!userName) openSetup();
    } catch (e) { openSetup(); }
  }
  function persistConversations() { safeSet(LS.conv, JSON.stringify(conversations)); }
  function saveSetup() {
    userName = userNameInput.value.trim();
    if (!userName) return;
    const selected = document.querySelector('.personality-btn.selected');
    aiPersonality = selected ? selected.dataset.value : "normal";
    safeSet(LS.profile, JSON.stringify({ name: userName, personality: aiPersonality }));
    closeSetup();
    if (!conversations.length) {
      const conv = { id: uid(), title: "Percakapan baru", createdAt: Date.now(), messages: [] };
      conversations = [conv, ...conversations];
      activeId = conv.id;
      persistConversations();
      renderConvList();
      renderMessages();
    }
  }
  function openSetup() { setupOverlay.classList.remove("hidden"); }
  function closeSetup() { setupOverlay.classList.add("hidden"); }

  personalityGrid.querySelectorAll('.personality-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      personalityGrid.querySelectorAll('.personality-btn').forEach(b => b.classList.remove('selected'));
      this.classList.add('selected');
    });
  });
  saveSetupBtn.addEventListener("click", saveSetup);

  function openDrawer() { drawer.classList.add("open"); drawerBackdrop.classList.add("open"); }
  function closeDrawer() { drawer.classList.remove("open"); drawerBackdrop.classList.remove("open"); }
  document.getElementById("historyToggle").addEventListener("click", () => { drawer.classList.contains("open") ? closeDrawer() : openDrawer(); });
  document.getElementById("drawerCloseBtn").addEventListener("click", closeDrawer);
  drawerBackdrop.addEventListener("click", closeDrawer);
  searchInput.addEventListener("input", (e) => { searchQuery = e.target.value.trim().toLowerCase(); renderConvList(); });
  document.getElementById("clearAllBtn").addEventListener("click", () => {
    if (!conversations.length) return;
    if (confirm("Hapus semua riwayat chat? Tindakan ini tidak bisa dibatalkan.")) {
      conversations = []; activeId = null; persistConversations(); renderConvList(); renderMessages();
    }
  });

  function newChat() {
    const conv = { id: uid(), title: "Percakapan baru", createdAt: Date.now(), messages: [] };
    conversations = [conv, ...conversations];
    persistConversations();
    activeId = conv.id;
    messageInputEl.value = ""; clearAttachment(); hideToast(); closeDrawer();
    renderConvList(); renderMessages();
  }
  document.getElementById("newChatBtn").addEventListener("click", newChat);
  document.getElementById("newChatBtnDrawer").addEventListener("click", newChat);

  function deleteChat(id, e) {
    e.stopPropagation();
    conversations = conversations.filter((c) => c.id !== id);
    persistConversations();
    if (activeId === id) activeId = conversations.length ? conversations[0].id : null;
    renderConvList(); renderMessages();
  }
  function selectChat(id) { activeId = id; hideToast(); closeDrawer(); renderConvList(); renderMessages(); }
  function getActive() { return conversations.find((c) => c.id === activeId) || null; }

  function resizeImage(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = () => reject(new Error("Gagal membaca gambar"));
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if (width > MAX_IMAGE_DIM || height > MAX_IMAGE_DIM) {
            const scale = MAX_IMAGE_DIM / Math.max(width, height);
            width = Math.round(width * scale); height = Math.round(height * scale);
          }
          const canvas = document.createElement("canvas");
          canvas.width = width; canvas.height = height;
          canvas.getContext("2d").drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL("image/jpeg", 0.85));
        };
        img.onerror = () => reject(new Error("Gagal memuat gambar"));
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }
  function readTextFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = () => reject(new Error("Gagal membaca dokumen"));
      reader.onload = () => resolve(reader.result);
      reader.readAsText(file);
    });
  }
  function toggleAttachMenu(force) {
    const open = typeof force === "boolean" ? force : !attachMenu.classList.contains("open");
    attachMenu.classList.toggle("open", open);
    attachBtn.classList.toggle("active", open);
  }
  attachBtn.addEventListener("click", () => toggleAttachMenu());
  document.addEventListener("click", (e) => {
    if (!attachMenu.contains(e.target) && !attachBtn.contains(e.target)) toggleAttachMenu(false);
  });
  document.getElementById("pickImageBtn").addEventListener("click", () => { toggleAttachMenu(false); imageInputEl.click(); });
  document.getElementById("pickDocBtn").addEventListener("click", () => { toggleAttachMenu(false); docInputEl.click(); });

  imageInputEl.addEventListener("change", async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    if (!file.type.startsWith("image/")) { showToast("File harus berupa gambar.", true); return; }
    try { attachment = { kind: "image", dataUrl: await resizeImage(file), name: file.name }; renderAttachPreview(); }
    catch (err) { showToast("Gagal memproses gambar.", true); }
    e.target.value = "";
  });
  docInputEl.addEventListener("change", async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const ext = file.name.split(".").pop().toLowerCase();
    if (TEXT_EXTENSIONS.includes(ext)) {
      try {
        const text = await readTextFile(file);
        attachment = { kind: "document", name: file.name, text: text.slice(0, 6000) };
        renderAttachPreview();
      } catch (err) { showToast("Gagal membaca dokumen.", true); }
    } else {
      attachment = { kind: "document", name: file.name, text: null };
      renderAttachPreview();
      showToast("Isi dokumen ini belum bisa dibaca otomatis — cuma nama filenya yang ikut dikirim.", false);
    }
    e.target.value = "";
  });
  function clearAttachment() { attachment = null; renderAttachPreview(); }
  function renderAttachPreview() {
    if (!attachment) { attachPreviewEl.classList.add("hidden"); attachPreviewEl.innerHTML = ""; return; }
    attachPreviewEl.classList.remove("hidden");
    attachPreviewEl.classList.add("glass");
    if (attachment.kind === "image") {
      attachPreviewEl.innerHTML = `<img src="${attachment.dataUrl}" alt="Preview"><button id="clearAttachBtn"><svg viewBox="0 0 22 22"><use href="#i-close"/></svg></button>`;
    } else {
      attachPreviewEl.innerHTML = `<div class="doc-icon"><svg viewBox="0 0 22 22"><use href="#i-document"/></svg></div><span class="attach-name">${escapeHtml(attachment.name)}</span><button id="clearAttachBtn"><svg viewBox="0 0 22 22"><use href="#i-close"/></svg></button>`;
    }
    document.getElementById("clearAttachBtn").addEventListener("click", clearAttachment);
  }

  const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognizer = null;
  if (SpeechRecognitionCtor) {
    recognizer = new SpeechRecognitionCtor();
    recognizer.lang = "id-ID";
    recognizer.interimResults = false;
    recognizer.maxAlternatives = 1;
    recognizer.onresult = (e) => {
      const text = e.results[0][0].transcript;
      messageInputEl.value = (messageInputEl.value ? messageInputEl.value + " " : "") + text;
      autoGrowTextarea();
    };
    recognizer.onend = () => { recognizing = false; micBtn.classList.remove("recording"); };
    recognizer.onerror = () => { recognizing = false; micBtn.classList.remove("recording"); showToast("Voice input gagal atau ditolak izinnya.", true); };
  } else {
    micBtn.style.opacity = "0.3"; micBtn.style.cursor = "not-allowed";
  }
  micBtn.addEventListener("click", () => {
    if (!recognizer) { showToast("Voice input tidak didukung di browser ini.", true); return; }
    if (recognizing) { recognizer.stop(); return; }
    try { recognizer.start(); recognizing = true; micBtn.classList.add("recording"); }
    catch (e) { showToast("Gagal memulai voice input.", true); }
  });

  function showToast(msg, isError) {
    toastBanner.innerHTML = `<svg viewBox="0 0 22 22"><use href="#${isError ? "i-alert" : "i-check"}"/></svg><span>${escapeHtml(msg)}</span>`;
    toastBanner.classList.remove("hidden");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(hideToast, 5000);
  }
  function hideToast() { toastBanner.classList.add("hidden"); }

  const EXT_MAP = { javascript: "js", js: "js", typescript: "ts", ts: "ts", python: "py", py: "py", html: "html", css: "css", json: "json", bash: "sh", sh: "sh", java: "java", c: "c", cpp: "cpp", php: "php" };

  function parseSegments(text) {
    const segments = [];
    const re = /```(\w+)?\n?([\s\S]*?)```/g;
    let last = 0, m;
    while ((m = re.exec(text)) !== null) {
      if (m.index > last) segments.push({ type: "text", content: text.slice(last, m.index) });
      segments.push({ type: "code", lang: (m[1] || "text").toLowerCase(), content: m[2].replace(/\n$/, "") });
      last = re.lastIndex;
    }
    if (last < text.length) segments.push({ type: "text", content: text.slice(last) });
    return segments;
  }

  function buildCodeBlock(lang, code) {
    const wrap = document.createElement("div");
    wrap.className = "code-block";
    wrap.innerHTML = `
      <div class="code-head">
        <span class="code-lang"></span>
        <div class="code-actions">
          <button class="code-btn copy-btn"><svg viewBox="0 0 22 22"><use href="#i-copy"/></svg> Copy</button>
          <button class="code-btn run-btn"><svg viewBox="0 0 22 22"><use href="#i-play"/></svg> Run</button>
          <button class="code-btn dl-btn"><svg viewBox="0 0 22 22"><use href="#i-download"/></svg> Download</button>
        </div>
      </div>
      <pre class="code-body"></pre>
      <div class="code-run-out"></div>
    `;
    wrap.querySelector(".code-lang").textContent = lang;
    wrap.querySelector(".code-body").textContent = code;
    const outEl = wrap.querySelector(".code-run-out");

    wrap.querySelector(".copy-btn").addEventListener("click", async (e) => {
      try {
        await navigator.clipboard.writeText(code);
        const btn = e.currentTarget;
        const orig = btn.innerHTML;
        btn.innerHTML = `<svg viewBox="0 0 22 22"><use href="#i-check"/></svg> Copied`;
        setTimeout(() => { btn.innerHTML = orig; }, 1400);
      } catch (err) {}
    });

    wrap.querySelector(".dl-btn").addEventListener("click", () => {
      const ext = EXT_MAP[lang] || "txt";
      const blob = new Blob([code], { type: "text/plain" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob); a.download = `cosmos-snippet.${ext}`; a.click();
      URL.revokeObjectURL(a.href);
    });

    wrap.querySelector(".run-btn").addEventListener("click", () => {
      if (lang === "html" || (lang === "text" && /<[a-z][\s\S]*>/i.test(code))) {
        previewFrame.srcdoc = code;
        previewOverlay.classList.remove("hidden");
      } else if (lang === "javascript" || lang === "js") {
        const logs = [];
        const iframe = document.createElement("iframe");
        iframe.style.display = "none";
        document.body.appendChild(iframe);
        try {
          iframe.contentWindow.console.log = (...args) => logs.push(args.map(String).join(" "));
          iframe.contentWindow.eval(code);
          outEl.textContent = logs.length ? logs.join("\n") : "(kode berjalan tanpa output console.log)";
        } catch (err) {
          outEl.textContent = "Error: " + err.message;
        }
        document.body.removeChild(iframe);
        outEl.classList.add("show");
      } else {
        outEl.textContent = `Live run belum didukung untuk bahasa "${lang}" — coba Copy atau Download.`;
        outEl.classList.add("show");
      }
    });

    return wrap;
  }

  function renderMessageContent(container, text, animate, onDone) {
    const segments = parseSegments(text);
    if (!animate) {
      segments.forEach((seg) => {
        if (seg.type === "text") {
          const t = document.createElement("span");
          t.className = "msg-text";
          t.textContent = seg.content;
          container.appendChild(t);
        } else {
          container.appendChild(buildCodeBlock(seg.lang, seg.content));
        }
      });
      if (onDone) onDone();
      return;
    }

    let segIndex = 0, charIndex = 0;
    const cursor = document.createElement("span");
    cursor.className = "type-cursor";

    function step() {
      if (segIndex >= segments.length) { cursor.remove(); if (onDone) onDone(); return; }
      const seg = segments[segIndex];
      if (seg.type === "code") {
        container.appendChild(buildCodeBlock(seg.lang, seg.content));
        segIndex++; charIndex = 0;
        messagesEl.scrollTop = messagesEl.scrollHeight;
        requestAnimationFrame(step);
        return;
      }
      let activeText = container.querySelector(".msg-text.typing-active");
      if (!activeText) {
        activeText = document.createElement("span");
        activeText.className = "msg-text typing-active";
        container.appendChild(activeText);
      }
      const chunk = seg.content.slice(charIndex, charIndex + 3);
      charIndex += 3;
      activeText.textContent += chunk;
      activeText.appendChild(cursor);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      if (charIndex >= seg.content.length) {
        activeText.classList.remove("typing-active");
        segIndex++; charIndex = 0;
      }
      setTimeout(step, 14);
    }
    step();
  }

  async function sendMessage() {
    const text = messageInputEl.value.trim();
    if (!text && !attachment) return;
    hideToast();

    let conv = getActive();
    if (!conv) conv = { id: uid(), title: "Percakapan baru", createdAt: Date.now(), messages: [] };

    let userContent;
    if (attachment && attachment.kind === "image") {
      userContent = [{ type: "text", text: text || "Tolong lihat gambar ini." }, { type: "image_url", image_url: { url: attachment.dataUrl } }];
    } else if (attachment && attachment.kind === "document") {
      const docBlock = attachment.text ? `[Dokumen: ${attachment.name}]\n${attachment.text}\n\n` : `[Dokumen terlampir: ${attachment.name} — isi belum bisa dibaca otomatis]\n\n`;
      userContent = docBlock + (text || "Tolong bahas dokumen ini.");
    } else { userContent = text; }

    const userMsg = { id: uid(), role: "user", content: userContent, text, image: attachment && attachment.kind === "image" ? attachment.dataUrl : null, doc: attachment && attachment.kind === "document" ? attachment.name : null };
    const isFirst = conv.messages.length === 0;
    conv = { ...conv, title: isFirst ? (text ? text.slice(0, 40) : (attachment ? `Lampiran: ${attachment.name}` : "Percakapan baru")) : conv.title, messages: [...conv.messages, userMsg] };

    const exists = conversations.some((c) => c.id === conv.id);
    conversations = exists ? conversations.map((c) => (c.id === conv.id ? conv : c)) : [conv, ...conversations];
    activeId = conv.id;
    persistConversations();

    messageInputEl.value = ""; autoGrowTextarea(); clearAttachment();
    loading = true;
    renderConvList(); renderMessages();

    try {
      const personalityMap = {
        normal: "Jawab dengan ramah, jelas, dan membantu. Gunakan bahasa Indonesia yang santun.",
        coding: "Jawab dengan gaya yang fokus pada kode dan logika. Berikan penjelasan teknis yang jelas. Sering berikan contoh kode. Gunakan bahasa Indonesia.",
        gaul: "Jawab dengan gaya anak muda yang santai, casual, pakai bahasa gaul kekinian. Ramah dan akrab. Gunakan bahasa Indonesia.",
        lucu: "Jawab dengan gaya yang lucu dan menghibur. Banyak bercanda dan guyonan. Tetap membantu tapi dengan sentuhan humor. Gunakan bahasa Indonesia."
      };
      const systemMsg = {
        role: "system",
        content: "Kamu adalah CosmosAI, asisten AI yang sedang mengobrol dengan pengguna" + (userName ? ` bernama ${userName}` : "") + ". " +
          (personalityMap[aiPersonality] || personalityMap.normal) +
          (userName ? ` Sapa pengguna dengan namanya (${userName}) secara natural, terutama di awal obrolan.` : "") +
          " Kalau memberikan kode, selalu bungkus dalam code fence markdown dengan nama bahasanya (```javascript, ```python, dll). Balas dalam Bahasa Indonesia kecuali diminta lain.",
      };
      const apiMessages = [systemMsg, ...conv.messages.map((m) => ({ role: m.role, content: m.content }))];
      const res = await fetch(GROQ_ENDPOINT, {
        method: "POST", headers: { "Content-Type": "application/json", Authorization: `Bearer ${API_KEY}` },
        body: JSON.stringify({ model: GROQ_MODEL, messages: apiMessages, temperature: 1, max_completion_tokens: 1536 }),
      });
      if (!res.ok) {
        const errBody = await res.json().catch(() => ({}));
        throw new Error((errBody && errBody.error && errBody.error.message) || `Request gagal (${res.status})`);
      }
      const data = await res.json();
      const reply = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || "(tidak ada respons)";
      const assistantMsg = { id: uid(), role: "assistant", content: reply, text: reply };
      conv = { ...conv, messages: [...conv.messages, assistantMsg] };
      conversations = conversations.map((c) => (c.id === conv.id ? conv : c));
      persistConversations();
      loading = false;
      renderMessages(true);
    } catch (err) {
      loading = false;
      renderMessages();
      showToast(err.message || "Terjadi kesalahan saat menghubungi Groq.", true);
    }
  }
  sendBtn.addEventListener("click", sendMessage);
  messageInputEl.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  function autoGrowTextarea() { messageInputEl.style.height = "auto"; messageInputEl.style.height = Math.min(messageInputEl.scrollHeight, 150) + "px"; }
  messageInputEl.addEventListener("input", autoGrowTextarea);

  function renderConvList() {
    convListEl.innerHTML = "";
    const filtered = searchQuery ? conversations.filter((c) => c.title.toLowerCase().includes(searchQuery)) : conversations;
    if (filtered.length === 0) {
      const empty = document.createElement("div");
      empty.className = "conv-empty";
      empty.textContent = conversations.length === 0 ? "Belum ada riwayat" : "Nggak ketemu chat yang cocok.";
      convListEl.appendChild(empty);
      return;
    }
    filtered.forEach((c) => {
      const item = document.createElement("div");
      item.className = "conv-item" + (c.id === activeId ? " active" : "");
      item.innerHTML = `<span class="conv-icon"><svg viewBox="0 0 22 22"><use href="#i-chat"/></svg></span><span class="conv-title"></span><button class="conv-del" aria-label="Hapus percakapan"><svg viewBox="0 0 22 22"><use href="#i-trash"/></svg></button>`;
      item.querySelector(".conv-title").textContent = c.title;
      item.addEventListener("click", () => selectChat(c.id));
      item.querySelector(".conv-del").addEventListener("click", (e) => deleteChat(c.id, e));
      convListEl.appendChild(item);
    });
  }

  function buildMessageRow(m, animate, onDone) {
    const row = document.createElement("div");
    row.className = "msg-row " + m.role;
    if (m.role === "assistant") {
      const av = document.createElement("div"); av.className = "msg-avatar assistant-avatar"; av.textContent = "C"; row.appendChild(av);
    }
    const bubble = document.createElement("div"); bubble.className = "msg-bubble";
    if (m.role === "user") {
      if (m.image) { const img = document.createElement("img"); img.src = m.image; img.className = "msg-image"; img.alt = "Lampiran"; bubble.appendChild(img); }
      if (m.doc) {
        const chip = document.createElement("div"); chip.className = "msg-doc-chip";
        chip.innerHTML = `<svg viewBox="0 0 22 22"><use href="#i-document"/></svg><span></span>`;
        chip.querySelector("span").textContent = m.doc;
        bubble.appendChild(chip);
      }
      if (m.text) { const t = document.createElement("span"); t.className = "msg-text"; t.textContent = m.text; bubble.appendChild(t); }
    } else {
      renderMessageContent(bubble, m.text || m.content, animate, onDone);
    }
    row.appendChild(bubble);
    if (m.role === "user") {
      const av = document.createElement("div"); av.className = "msg-avatar user-avatar";
      av.textContent = userName ? userName.trim().slice(0, 2).toUpperCase() : "Km";
      row.appendChild(av);
    }
    return row;
  }

  function renderMessages(animateLast) {
    const active = getActive();
    if (!active || active.messages.length === 0) {
      welcomeCenter.classList.remove("hidden");
      messagesEl.classList.add("hidden");
      messagesEl.innerHTML = "";
      if (!loading) return;
    } else {
      welcomeCenter.classList.add("hidden");
      messagesEl.classList.remove("hidden");
    }

    messagesEl.innerHTML = "";
    if (active) {
      active.messages.forEach((m, i) => {
        const isLast = i === active.messages.length - 1 && m.role === "assistant";
        messagesEl.appendChild(buildMessageRow(m, isLast && animateLast, null));
      });
    }
    if (loading) {
      welcomeCenter.classList.add("hidden");
      messagesEl.classList.remove("hidden");
      const row = document.createElement("div");
      row.className = "msg-row assistant";
      row.innerHTML = `<div class="msg-avatar assistant-avatar">C</div><div class="msg-bubble loading-bubble"><div class="orbit-loader"><div class="orbit-loader-core"></div><div class="orbit-loader-ring"><div class="orbit-loader-dot"></div></div></div></div>`;
      messagesEl.appendChild(row);
    }

    smoothScrollToBottom();
  }

  document.getElementById("previewCloseBtn").addEventListener("click", () => { previewOverlay.classList.add("hidden"); previewFrame.srcdoc = ""; });

  function initCosmos() {
    const canvas = document.getElementById("cosmosCanvas");
    const ctx = canvas.getContext("2d");
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    let stars = [], dust = [], meteors = [];

    function resize() {
      canvas.width = window.innerWidth * devicePixelRatio;
      canvas.height = window.innerHeight * devicePixelRatio;
      const area = canvas.width * canvas.height;
      stars = Array.from({ length: Math.floor(area / 4200) }, () => ({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        r: Math.random() * 1.3 * devicePixelRatio + 0.3, phase: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.015 + 0.004, baseAlpha: Math.random() * 0.5 + 0.25,
      }));
      dust = Array.from({ length: Math.floor(area / 30000) }, () => ({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        r: Math.random() * 1.6 * devicePixelRatio + 0.6, dx: (Math.random() - 0.5) * 0.05, dy: (Math.random() - 0.5) * 0.05,
        alpha: Math.random() * 0.15 + 0.04,
      }));
    }
    resize();
    window.addEventListener("resize", resize);

    function maybeSpawnMeteor() {
      if (reduceMotion) return;
      if (Math.random() < 0.0025 && meteors.length < 2) {
        const startX = Math.random() * canvas.width * 0.6 + canvas.width * 0.2;
        meteors.push({ x: startX, y: -20, vx: 2.2 * devicePixelRatio, vy: 1.6 * devicePixelRatio, life: 0, maxLife: 90, trail: [] });
      }
    }

    function draw(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const s of stars) {
        const twinkle = reduceMotion ? 0 : Math.sin(t * s.speed + s.phase) * 0.35;
        ctx.globalAlpha = Math.max(0, Math.min(1, s.baseAlpha + twinkle));
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
      }
      for (const d of dust) {
        if (!reduceMotion) { d.x += d.dx; d.y += d.dy; if (d.x < 0) d.x = canvas.width; if (d.x > canvas.width) d.x = 0; if (d.y < 0) d.y = canvas.height; if (d.y > canvas.height) d.y = 0; }
        ctx.globalAlpha = d.alpha; ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2); ctx.fill();
      }
      maybeSpawnMeteor();
      meteors = meteors.filter((m) => m.life < m.maxLife);
      for (const m of meteors) {
        m.trail.push({ x: m.x, y: m.y });
        if (m.trail.length > 14) m.trail.shift();
        m.x += m.vx; m.y += m.vy; m.life++;
        const fadeIn = Math.min(1, m.life / 10);
        const fadeOut = Math.min(1, (m.maxLife - m.life) / 20);
        const alpha = Math.min(fadeIn, fadeOut);
        for (let i = 0; i < m.trail.length; i++) {
          const p = m.trail[i];
          ctx.globalAlpha = alpha * (i / m.trail.length) * 0.55;
          ctx.fillStyle = "#fff";
          ctx.beginPath(); ctx.arc(p.x, p.y, 1.1 * devicePixelRatio, 0, Math.PI * 2); ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
  }

  function initOrbitSatellites() {
    const emblem = document.getElementById("orbitEmblem");
    const count = 14;
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const radius = 40 + Math.random() * 90;
      const size = Math.random() * 3.4 + 1.4;
      const x = 130 + Math.cos(angle) * radius;
      const y = 130 + Math.sin(angle) * radius;
      const dot = document.createElement("div");
      dot.className = "orbit-satellite";
      dot.style.width = size + "px"; dot.style.height = size + "px";
      dot.style.left = x + "px"; dot.style.top = y + "px";
      dot.style.opacity = (Math.random() * 0.5 + 0.4).toFixed(2);
      dot.style.boxShadow = `0 0 ${size * 2}px rgba(255,255,255,0.5)`;
      emblem.appendChild(dot);
    }
  }

  (function init() {
    initCosmos();
    initOrbitSatellites();
    loadState();
    renderConvList();
    renderMessages();
    setTimeout(() => messageInputEl.focus(), 300);
  })();
})();
</script>
